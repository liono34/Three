<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Search Car</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{min-height:100vh;background:#0a0a12;color:#fff;position:relative;overflow-x:hidden}#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}.navbar{position:relative;z-index:2;background:rgba(30,30,50,.7);backdrop-filter:blur(15px);padding:18px 25px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.4)}.logo{background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:24px;font-weight:700}.nav-links{display:flex;flex-wrap:wrap;gap:18px}.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:16px;font-weight:500;transition:all .3s}.nav-links a:hover{color:#00ffe7;transform:scale(1.08)}.container{position:relative;z-index:2;width:100%;max-width:900px;margin:40px auto;padding:0 20px}.search-box{background:rgba(30,30,50,.6);backdrop-filter:blur(20px);border-radius:16px;padding:30px;border:1px solid rgba(255,255,255,.1);text-align:center;margin-bottom:30px}.search-title{font-size:28px;background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}.search-input{display:flex;gap:12px;align-items:center;justify-content:center}input{flex:1;max-width:500px;height:54px;background:rgba(20,20,40,.7);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:0 18px;font-size:16px;color:#fff;outline:none}input:focus{border-color:#7a00ff}button{height:54px;padding:0 24px;background:linear-gradient(90deg,#7a00ff,#00ffe7);color:#fff;border:none;border-radius:14px;font-weight:600;cursor:pointer}.result-box{background:rgba(30,30,50,.6);backdrop-filter:blur(20px);border-radius:16px;padding:25px;border:1px solid rgba(255,255,255,.1)}.result-title{font-size:20px;margin-bottom:15px;color:#00ffe7}.car-item{padding:12px;border-bottom:1px solid rgba(255,255,255,.1)}.car-item:last-child{border-bottom:none}.no-result{color:#ff4444;text-align:center;padding:20px}@media (max-width:768px){.navbar{flex-direction:column;text-align:center;padding:15px}.nav-links{justify-content:center}.search-input{flex-direction:column}input{width:100%}}</style>
</head>
<body>
<div id="particles"></div>
<div class="navbar">
<div class="logo">Car Sales Platform</div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="seller.html">Seller Center</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="add-car.html">Add Car</a>
<a href="search.html">Search Car</a>
<a href="database.html">Database</a>
</div>
</div>
<div class="container">
<div class="search-box">
<h2 class="search-title">Search Vehicles</h2>
<div class="search-input">
<input type="text" id="keyword" placeholder="Search brand or model">
<button onclick="searchCar()">Search</button>
</div>
</div>
<div class="result-box">
<h3 class="result-title">Results</h3>
<div id="resultList"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="db.js"></script>
<script>
particlesJS("particles",{particles:{number:{value:80},size:{value:2.5},color:{value:"#ffffff"},line_linked:{enable:true,distance:120,color:"#ffffff",opacity:.15,width:1},move:{enable:true,speed:.8,straight:false}},interactivity:{events:{onhover:{enable:true,mode:"grab"}}},retina_detect:true});

DB.initDB();

function searchCar() {
    let kw = document.getElementById('keyword').value.trim();
    let list = DB.searchCars(kw);
    let html = "";

    if (list.length === 0) {
        html = '<div class="no-result">No matching vehicles</div>';
    } else {
        list.forEach(car => {
            html += `<div class="car-item">${car.brand} ${car.model} | ${car.year} | $${car.price} | ${car.color}</div>`;
        });
    }

    document.getElementById('resultList').innerHTML = html;
}
</script>
</body>
</html>
