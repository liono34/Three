<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Database View</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{min-height:100vh;background:#0a0a12;color:#fff;position:relative;overflow-x:hidden}#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}.navbar{position:relative;z-index:2;background:rgba(30,30,50,.7);backdrop-filter:blur(15px);padding:18px 25px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.4)}.logo{background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:24px;font-weight:700}.nav-links{display:flex;flex-wrap:wrap;gap:18px}.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:16px;font-weight:500;transition:all .3s}.nav-links a:hover{color:#00ffe7;transform:scale(1.08)}.container{position:relative;z-index:2;width:100%;max-width:1000px;margin:40px auto;padding:0 20px}.panel{background:rgba(30,30,50,.6);backdrop-filter:blur(20px);border-radius:16px;padding:25px;margin-bottom:25px;border:1px solid rgba(255,255,255,.1)}.panel h2{background:linear-gradient(90deg,#7a00ff,#00ffe7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px}.table{width:100%;border-collapse:collapse;background:rgba(20,20,40,.5);border-radius:10px;overflow:hidden}th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}th{background:rgba(255,255,255,.05);color:#00ffe7}tr:hover{background:rgba(255,255,255,.05)}@media (max-width:768px){.navbar{flex-direction:column;text-align:center;padding:15px}.nav-links{justify-content:center}}</style>
</head>
<body>
<div id="particles"></div>
<div class="navbar">
<div class="logo">Car Sales Platform</div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="seller.html">Seller Center</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="add-car.html">Add Car</a>
<a href="search.html">Search Car</a>
<a href="database.html">Database</a>
</div>
</div>
<div class="container">
<div class="panel">
<h2>Table: sellers (卖家表)</h2>
<table id="sellerTable" class="table">
<thead><tr><th>ID</th><th>Fullname</th><th>Username</th><th>Phone</th><th>Email</th></tr></thead>
<tbody></tbody>
</table>
</div>
<div class="panel">
<h2>Table: cars (车辆表)</h2>
<table id="carTable" class="table">
<thead><tr><th>ID</th><th>Brand</th><th>Model</th><th>Year</th><th>Price</th><th>Color</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="db.js"></script>
<script>
particlesJS("particles",{particles:{number:{value:80},size:{value:2.5},color:{value:"#ffffff"},line_linked:{enable:true,distance:120,color:"#ffffff",opacity:.15,width:1},move:{enable:true,speed:.8,straight:false}},interactivity:{events:{onhover:{enable:true,mode:"grab"}}},retina_detect:true});
DB.initDB();
function loadTables(){
let s=DB.getSellers();
let st=document.querySelector('#sellerTable tbody');
st.innerHTML='';
s.forEach(e=>{st.innerHTML+=`<tr><td>${e.id}</td><td>${e.fullname}</td><td>${e.username}</td><td>${e.phone}</td><td>${e.email}</td></tr>`;});
let c=DB.getCars();
let ct=document.querySelector('#carTable tbody');
ct.innerHTML='';
c.forEach(e=>{ct.innerHTML+=`<tr><td>${e.id}</td><td>${e.brand}</td><td>${e.model}</td><td>${e.year}</td><td>${e.price}</td><td>${e.color}</td></tr>`;});
}
window.onload=loadTables;
</script>
</body>
</html>
