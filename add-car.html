<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Car</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}body{min-height:100vh;background:#0a0a12;color:#fff;position:relative;overflow-x:hidden}#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}.navbar{position:relative;z-index:2;background:rgba(30,30,50,.7);backdrop-filter:blur(15px);padding:18px 25px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.4)}.logo{background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:24px;font-weight:700}.nav-links{display:flex;flex-wrap:wrap;gap:18px}.nav-links a{color:rgba(255,255,255,.75);text-decoration:none;font-size:16px;font-weight:500;transition:all .3s}.nav-links a:hover{color:#00ffe7;transform:scale(1.08)}.card{position:relative;z-index:2;width:100%;max-width:450px;margin:60px auto;background:rgba(30,30,50,.6);backdrop-filter:blur(20px);border-radius:24px;padding:40px 30px;border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 40px rgba(0,0,0,.6)}.title{font-size:30px;font-weight:700;background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}.sub{color:rgba(255,255,255,.6);text-align:center;margin-bottom:25px}.input-box{margin-bottom:18px}input{width:100%;height:52px;background:rgba(20,20,40,.7);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:0 18px;font-size:16px;color:#fff;outline:none;transition:all .3s}input::placeholder{color:rgba(255,255,255,.4)}input:focus{border-color:#7a00ff;box-shadow:0 0 12px #7a00ff;transform:scale(1.03)}.add-btn{width:100%;height:54px;background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:10px;box-shadow:0 6px 20px rgba(122,0,255,.3)}.add-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(122,0,255,.5)}.msg{position:relative;z-index:2;text-align:center;color:#fff;margin-top:16px;font-size:14px}@media (max-width:768px){.navbar{flex-direction:column;text-align:center;padding:15px}.nav-links{justify-content:center}.card{margin:40px auto}}</style>
</head>
<body>
<div id="particles"></div>
<div class="navbar">
<div class="logo">Car Sales Platform</div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="seller.html">Seller Center</a>
<a href="register.html">Register</a>
<a href="login.html">Login</a>
<a href="add-car.html">Add Car</a>
<a href="search.html">Search Car</a>
<a href="database.html">Database</a>
</div>
</div>
<div class="card">
<h2 class="title">Add New Car</h2>
<p class="sub">Upload vehicle information</p>
<div class="input-box"><input type="text" id="brand" placeholder="Brand (e.g. Toyota)"></div>
<div class="input-box"><input type="text" id="model" placeholder="Model (e.g. Camry)"></div>
<div class="input-box"><input type="text" id="year" placeholder="Year"></div>
<div class="input-box"><input type="text" id="price" placeholder="Price"></div>
<div class="input-box"><input type="text" id="color" placeholder="Color"></div>
<button class="add-btn" onclick="addCar()">Add Car</button>
</div>
<div class="msg" id="tip"></div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="db.js"></script>
<script>
particlesJS("particles",{particles:{number:{value:80},size:{value:2.5},color:{value:"#ffffff"},line_linked:{enable:true,distance:120,color:"#ffffff",opacity:.15,width:1},move:{enable:true,speed:.8,straight:false}},interactivity:{events:{onhover:{enable:true,mode:"grab"}}},retina_detect:true});
DB.initDB();
function addCar(){
let brand=document.getElementById('brand').value.trim();
let model=document.getElementById('model').value.trim();
let year=document.getElementById('year').value.trim();
let price=document.getElementById('price').value.trim();
let color=document.getElementById('color').value.trim();
let tip=document.getElementById('tip');
if(!brand||!model||!year||!price||!color){tip.innerText='Please fill all fields';tip.style.color='#ff4444';return;}
DB.addCar({brand,model,year,price,color});
tip.innerText='✅ Car added successfully!';tip.style.color='#00ffe7';
document.getElementById('brand').value='';
document.getElementById('model').value='';
document.getElementById('year').value='';
document.getElementById('price').value='';
document.getElementById('color').value='';
}
</script>
</body>
</html>
