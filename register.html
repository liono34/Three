<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Car Sales Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
  min-height:100vh;
  background:#0a0a12;
  position:relative;overflow-x:hidden;
  color:#fff;
}
#particles{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
}

.navbar {
  position:relative;z-index:2;
  background:rgba(30,30,50,0.7);
  backdrop-filter:blur(15px);
  padding: 18px 25px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.logo {
  background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size: 24px;
  font-weight: 700;
}
.nav-links {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
}
.nav-links a {
  color:rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 16px;
  font-weight:500;
  transition:all 0.3s;
}
.nav-links a:hover {
  color:#00ffe7;
  transform:scale(1.08);
}


.card{
  position:relative;z-index:2;
  width:100%;max-width:400px;
  margin: 60px auto;
  background:rgba(30,30,50,0.6);
  backdrop-filter:blur(20px);
  border-radius:24px;padding:40px 30px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}
.title{
  font-size:30px;font-weight:700;
  background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;margin-bottom:8px;
}
.sub{
  color:rgba(255,255,255,0.6);
  text-align:center;margin-bottom:25px;
}
.input-box{margin-bottom:18px}
input{
  width:100%;height:52px;
  background:rgba(20,20,40,0.7);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;padding:0 18px;
  font-size:16px;color:#fff;outline:none;
  transition:all 0.3s;
}
input::placeholder{color:rgba(255,255,255,0.4)}
input:focus{
  border-color:#7a00ff;
  box-shadow:0 0 12px #7a00ff;
  transform:scale(1.03);
}
.reg-btn{
  width:100%;height:54px;
  background:linear-gradient(90deg,#7a00ff,#00ffe7,#ff00c8);
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:600;cursor:pointer;
  transition:all 0.3s;margin-top:10px;
  box-shadow:0 6px 20px rgba(122,0,255,0.3);
}
.reg-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(122,0,255,0.5);
}
.link{
  text-align:center;margin-top:24px;
  color:rgba(255,255,255,0.6);
}
.link a{
  color:#ff00c8;text-decoration:none;font-weight:500;
}
.msg{
  position:relative;z-index:2;
  text-align:center;color:#fff;margin-top:16px;font-size:14px;
}

@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    text-align: center;
    padding:15px;
  }
  .nav-links {
    justify-content: center;
  }
  .card{
    margin: 30px auto;
  }
}
</style>
</head>
<body>
<div id="particles"></div>


<div class="navbar">
  <div class="logo">Car Sales Platform</div>
  <div class="nav-links">
    <a href="index.html">Home</a >
    <a href="seller.html">Seller Center</a >
    <a href="register.html">Register</a >
    <a href="login.html">Login</a >
    <a href="add-car.html">Add Car</a >
    <a href="search.html">Search Car</a >
    <a href="database.html">Database</a >
  </div>
</div>


<div class="card">
  <h2 class="title">Create Account</h2>
  <p class="sub">Register your new account</p >
  <div class="input-box">
    <input type="text" id="fullname" placeholder="Full Name">
  </div>
  <div class="input-box">
    <input type="text" id="address" placeholder="Address">
  </div>
  <div class="input-box">
    <input type="text" id="phone" placeholder="Phone Number">
  </div>
  <div class="input-box">
    <input type="email" id="email" placeholder="Email">
  </div>
  <div class="input-box">
    <input type="text" id="username" placeholder="Username">
  </div>
  <div class="input-box">
    <input type="password" id="password" placeholder="Password">
  </div>
  <div class="input-box">
    <input type="password" id="repwd" placeholder="Confirm Password">
  </div>
  <button class="reg-btn" onclick="userRegister()">Register</button>
  <div class="link">Already have an account? <a href="login.html">Back to Login</a ></div>
</div>
<div class="msg" id="tip"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="db.js"></script>
<script>
particlesJS("particles",{
  particles:{number:{value:80},size:{value:2.5},color:{value:"#ffffff"},
  line_linked:{enable:true,distance:120,color:"#ffffff",opacity:0.15,width:1},
  move:{enable:true,speed:0.8,straight:false}},
  interactivity:{events:{onhover:{enable:true,mode:"grab"}}},retina_detect:true
});

DB.initDB();

function userRegister(){
  let fullname = document.getElementById('fullname').value.trim();
  let address = document.getElementById('address').value.trim();
  let phone = document.getElementById('phone').value.trim();
  let email = document.getElementById('email').value.trim();
  let user = document.getElementById('username').value.trim();
  let pwd = document.getElementById('password').value.trim();
  let repwd = document.getElementById('repwd').value.trim();
  let tip = document.getElementById('tip');

  if(!fullname || !address || !phone || !email || !user || !pwd || !repwd){
    tip.innerText = 'Please fill in all fields';
    tip.style.color = '#ff4444';
    return;
  }
  if(pwd !== repwd){
    tip.innerText = 'Passwords do not match';
    tip.style.color = '#ff4444';
    return;
  }
  
  const existingSeller = DB.findSellerByUsername(user);
  if (existingSeller) {
    tip.innerText = 'Username already exists!';
    tip.style.color = '#ff4444';
    return;
  }

  const newSeller = {
    fullname: fullname,
    address: address,
    phone: phone,
    email: email,
    username: user,
    password: pwd
  };

  DB.addSeller(newSeller);
  
  tip.innerText = '✅ Registration successful! Account: ' + user + ' (ID: ' + DB.getSellers().length + ')';
  tip.style.color = '#00ffe7';
  
  document.getElementById('fullname').value = '';
  document.getElementById('address').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('email').value = '';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('repwd').value = '';
}
</script>
</body>
</html>
